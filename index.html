<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dziesmas">
  <link rel="manifest" href="manifest.json">
  <title>Latvijas Dziesmas</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #0f0f1a;
      --surface:   #1a1a2e;
      --card:      #212140;
      --border:    #2e2e55;
      --accent:    #c8a96e;
      --accent2:   #7e9fc4;
      --text:      #e8e4dc;
      --muted:     #8a85a0;
      --danger:    #e07070;
      --radius:    14px;
      --safe-top:  env(safe-area-inset-top, 0px);
      --safe-bot:  env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 16px;
      overflow: hidden;
    }

    /* ── LAYOUT ── */
    #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

    /* ── HEADER ── */
    #header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: calc(var(--safe-top) + 12px) 16px 12px;
      flex-shrink: 0;
      z-index: 10;
    }
    #header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    #logo {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--accent);
      letter-spacing: 0.02em;
      flex: 1;
      white-space: nowrap;
    }
    #logo span { font-style: italic; }

    /* Search */
    #search-wrap { position: relative; }
    #search {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 14px 9px 38px;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }
    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 15px;
    }
    #search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      display: none;
    }

    /* Filter chips */
    #filter-row {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
      margin-top: 8px;
    }
    #filter-row::-webkit-scrollbar { display: none; }
    .filter-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-family: inherit;
      font-size: 12px;
      padding: 5px 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all .2s;
      flex-shrink: 0;
    }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #1a1a2e;
      font-weight: 600;
    }

    /* ── FILTER PANEL ── */
    #filter-icon-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      padding: 9px 12px;
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
      transition: all .2s;
    }
    #filter-icon-btn.has-filters {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Filter drawer */
    #filter-drawer {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
    }
    #filter-drawer.open { display: block; }
    #filter-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.6);
    }
    #filter-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      padding: 20px 16px calc(var(--safe-bot) + 20px);
      max-height: 80vh;
      overflow-y: auto;
    }
    .drawer-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .filter-section { margin-bottom: 20px; }
    .filter-section h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all .2s;
    }
    .chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #1a1a2e;
      font-weight: 600;
    }
    #filter-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .btn-outline {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-family: inherit;
      font-size: 14px;
      padding: 11px;
      cursor: pointer;
    }
    .btn-primary {
      flex: 2;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #1a1a2e;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 11px;
      cursor: pointer;
    }

    /* ── RESULTS BAR ── */
    #results-bar {
      padding: 8px 16px;
      font-size: 12px;
      color: var(--muted);
      background: var(--bg);
      flex-shrink: 0;
    }

    /* ── SONG LIST ── */
    #list-view {
      flex: 1;
      overflow-y: auto;
      padding: 4px 12px calc(var(--safe-bot) + 80px);
      overscroll-behavior: contain;
    }
    #list-view::-webkit-scrollbar { width: 4px; }
    #list-view::-webkit-scrollbar-track { background: transparent; }
    #list-view::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .song-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color .2s, transform .1s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .song-card:active { transform: scale(.99); }
    .song-card:hover { border-color: var(--accent2); }

    .song-num {
      font-size: 11px;
      color: var(--muted);
      min-width: 28px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .song-info { flex: 1; min-width: 0; }
    .song-lv {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .song-es {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .song-tags { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
    .tag {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      border: 1px solid;
    }
    .tag-tiempo { border-color: #7e9fc4; color: #7e9fc4; }
    .tag-eucaristia { border-color: #9fc4a0; color: #9fc4a0; }
    .tag-liturgia { border-color: #c49f7e; color: #c49f7e; }
    .tag-etapa { border-color: #b07ec4; color: #b07ec4; }

    .song-icons { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
    .icon-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      opacity: .5;
    }
    .has-audio .icon-dot.audio { background: var(--accent); opacity: 1; }
    .has-pdf .icon-dot.pdf { background: var(--accent2); opacity: 1; }

    /* ── DETAIL VIEW ── */
    #detail-view {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }
    #detail-view.open { display: flex; }

    #detail-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: calc(var(--safe-top) + 10px) 16px 12px;
      flex-shrink: 0;
    }
    #back-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      padding: 4px 0;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }
    #detail-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--text);
      line-height: 1.2;
    }
    #detail-subtitle { font-size: 14px; color: var(--muted); margin-top: 4px; }

    #detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px calc(var(--safe-bot) + 20px);
    }

    /* Info grid */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .info-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
    }
    .info-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 3px;
    }
    .info-value {
      font-size: 14px;
      color: var(--text);
    }
    .info-item.full { grid-column: 1 / -1; }

    /* Audio player */
    #audio-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }
    #audio-section h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      margin-bottom: 12px;
    }
    #player-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #play-btn {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #1a1a2e;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .1s, background .2s;
    }
    #play-btn:active { transform: scale(.95); }
    #play-btn.loading { background: var(--muted); }

    #progress-wrap { flex: 1; }
    #progress-bar {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 6px;
      cursor: pointer;
      position: relative;
    }
    #progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width .3s linear;
    }
    #time-display {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    #download-audio-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: inherit;
      font-size: 12px;
      padding: 6px 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 10px;
      transition: all .2s;
    }
    #download-audio-btn:hover { border-color: var(--accent); color: var(--accent); }
    #download-audio-btn.downloaded { border-color: #9fc4a0; color: #9fc4a0; }

    /* PDF button */
    #pdf-btn {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--accent2);
      border-radius: var(--radius);
      color: var(--accent2);
      font-family: inherit;
      font-size: 15px;
      padding: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 16px;
      transition: background .2s;
    }
    #pdf-btn:active { background: rgba(126,159,196,.15); }

    /* Texto */
    #texto-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }
    #texto-section h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      margin-bottom: 12px;
    }
    #texto-content {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
    }
    #texto-content strong { color: var(--accent); font-weight: 400; font-style: italic; }

    /* ── EMPTY STATE ── */
    #empty-state {
      display: none;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    #empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
    #empty-state p { font-size: 14px; line-height: 1.5; }

    /* ── OFFLINE BADGE ── */
    #offline-badge {
      position: fixed;
      bottom: calc(var(--safe-bot) + 16px);
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--danger);
      color: white;
      font-size: 12px;
      padding: 8px 16px;
      border-radius: 20px;
      transition: transform .3s;
      z-index: 200;
      pointer-events: none;
    }
    #offline-badge.show { transform: translateX(-50%) translateY(0); }

    /* ── ANIMATIONS ── */
    .song-card { animation: fadeIn .3s ease both; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HIGHLIGHT ── */
    mark {
      background: rgba(200,169,110,.3);
      color: var(--accent);
      border-radius: 2px;
      padding: 0 1px;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- LIST VIEW -->
  <div id="list-view-container" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
    <div id="header">
      <div id="header-top">
        <div id="logo">Latvijas <span>Dziesmas</span></div>
        <button id="filter-icon-btn" onclick="openFilterDrawer()" title="Filtros">⚙</button>
      </div>
      <div id="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="search" type="text" placeholder="Buscar canción…" oninput="onSearch()" onkeyup="onSearch()" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <button id="search-clear" onclick="clearSearch()">✕</button>
      </div>
      <div id="filter-row"></div>
    </div>

    <div id="results-bar"></div>

    <div id="list-view"></div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="detail-view">
    <div id="detail-header">
      <button id="back-btn" onclick="closeDetail()">← Volver</button>
      <div id="detail-title"></div>
      <div id="detail-subtitle"></div>
    </div>
    <div id="detail-body">
      <div class="info-grid" id="info-grid"></div>
      <div id="audio-section" style="display:none">
        <h3>🎵 Audio</h3>
        <div id="player-controls">
          <button id="play-btn" onclick="togglePlay()">▶</button>
          <div id="progress-wrap">
            <div id="progress-bar" onclick="seekAudio(event)">
              <div id="progress-fill"></div>
            </div>
            <div id="time-display">
              <span id="time-current">0:00</span>
              <span id="time-total">--:--</span>
            </div>
          </div>
        </div>
        <button id="download-audio-btn" onclick="downloadAudio()">
          <span id="dl-icon">⬇</span> <span id="dl-label">Descargar para uso offline</span>
        </button>
      </div>
      <button id="pdf-btn" onclick="openPDF()" style="display:none">
        📄 Ver partitura (PDF)
      </button>
      <div id="texto-section" style="display:none">
        <h3>📜 Texto</h3>
        <div id="texto-content"></div>
      </div>
    </div>
  </div>

</div>

<!-- FILTER DRAWER -->
<div id="filter-drawer">
  <div id="filter-overlay" onclick="closeFilterDrawer()"></div>
  <div id="filter-panel">
    <div class="drawer-handle"></div>
    <div class="filter-section">
      <h3>Tiempo litúrgico</h3>
      <div class="chip-group" id="chips-tiempo"></div>
    </div>
    <div class="filter-section">
      <h3>Eucaristía</h3>
      <div class="chip-group" id="chips-eucaristia"></div>
    </div>
    <div class="filter-section">
      <h3>Liturgia</h3>
      <div class="chip-group" id="chips-liturgia"></div>
    </div>
    <div class="filter-section">
      <h3>Etapa</h3>
      <div class="chip-group" id="chips-etapa"></div>
    </div>
    <div class="filter-actions" id="filter-actions">
      <button class="btn-outline" onclick="clearFilters()">Limpiar</button>
      <button class="btn-primary" onclick="applyFilters()">Aplicar filtros</button>
    </div>
  </div>
</div>

<!-- OFFLINE BADGE -->
<div id="offline-badge">Sin conexión</div>

<audio id="audio-el"></audio>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
let SONGS = [];
let filtered = [];
let activeFilters = { tiempo: null, eucaristia: null, liturgia: null, etapa: null };
let pendingFilters = { tiempo: null, eucaristia: null, liturgia: null, etapa: null };
let currentSong = null;
let audioEl = document.getElementById('audio-el');

// ─── LOAD DATA ───────────────────────────────────────────────────────────────
fetch('./songs.json')
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(data => {
    SONGS = data.filter(s => s.lv);
    buildFilterChips();
    renderList(SONGS);
  })
  .catch(err => {
    document.getElementById('list-view').innerHTML =
      '<div style="padding:40px;text-align:center;color:var(--muted)"><p>Error cargando datos.<br>Asegúrate de que songs.json está en la misma carpeta que index.html y de que accedes por HTTP (no abriendo el archivo directamente).<br><br>Error: ' + err + '</p></div>';
  });

// ─── SEARCH & FILTER ─────────────────────────────────────────────────────────
function getQuery() { return document.getElementById('search').value.trim().toLowerCase(); }

function filterSongs() {
  const q = getQuery();
  filtered = SONGS.filter(s => {
    if (activeFilters.tiempo && s.tiempo !== activeFilters.tiempo) return false;
    if (activeFilters.eucaristia && s.eucaristia !== activeFilters.eucaristia) return false;
    if (activeFilters.liturgia && s.liturgia !== activeFilters.liturgia) return false;
    if (activeFilters.etapa && s.etapa !== activeFilters.etapa) return false;
    if (q) {
      const hay = [s.lv, s.es, s.it, s.biblia].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  return filtered;
}

function onSearch() {
  const q = document.getElementById('search').value;
  document.getElementById('search-clear').style.display = q ? 'block' : 'none';
  renderList(filterSongs());
}

function clearSearch() {
  document.getElementById('search').value = '';
  document.getElementById('search-clear').style.display = 'none';
  renderList(filterSongs());
}

function highlight(text, q) {
  if (!q || !text) return text || '';
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(esc, 'gi'), m => `<mark>${m}</mark>`);
}

// ─── RENDER LIST ─────────────────────────────────────────────────────────────
function renderList(songs) {
  const list = document.getElementById('list-view');
  const bar = document.getElementById('results-bar');
  const q = getQuery();

  if (!songs.length) {
    list.innerHTML = '<div id="empty-state"><div class="empty-icon">🎵</div><p>No se encontraron canciones<br>con esos criterios.</p></div>';
    bar.textContent = '0 canciones';
    return;
  }
  bar.textContent = `${songs.length} canción${songs.length !== 1 ? 'es' : ''}`;

  const frag = document.createDocumentFragment();
  songs.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = `song-card${s.audio ? ' has-audio' : ''}${s.pdf ? ' has-pdf' : ''}`;
    div.style.animationDelay = Math.min(i * 20, 300) + 'ms';
    div.onclick = () => openDetail(s);

    const tags = [];
    if (s.tiempo) tags.push(`<span class="tag tag-tiempo">${s.tiempo}</span>`);
    if (s.eucaristia) tags.push(`<span class="tag tag-eucaristia">${s.eucaristia}</span>`);
    if (s.liturgia) tags.push(`<span class="tag tag-liturgia">${s.liturgia}</span>`);

    div.innerHTML = `
      <div class="song-num">${s.pagina || ''}</div>
      <div class="song-info">
        <div class="song-lv">${highlight(s.lv, q)}</div>
        ${s.es ? `<div class="song-es">${highlight(s.es, q)}</div>` : ''}
        ${tags.length ? `<div class="song-tags">${tags.join('')}</div>` : ''}
      </div>
      <div class="song-icons">
        <div class="icon-dot audio" title="Audio disponible"></div>
        <div class="icon-dot pdf" title="PDF disponible"></div>
      </div>`;
    frag.appendChild(div);
  });
  list.innerHTML = '';
  list.appendChild(frag);
  updateActiveChips();
}

// ─── FILTER CHIPS ────────────────────────────────────────────────────────────
const FILTER_DEFS = [
  { key: 'tiempo',     el: 'chips-tiempo',
    values: ['Advents','Lielais gavēnis','Lieldienas','Vasarsvētki','Ziemassvētki'] },
  { key: 'eucaristia', el: 'chips-eucaristia',
    values: ['Sākuma dziesmas','Miers','Maize','Vīns','Noslēguma dziesmas'] },
  { key: 'liturgia',   el: 'chips-liturgia',
    values: ['Marija','Gandarīšanas liturģijas dziesmas','Laudes un Vesperes',
             'Liturģijas dziesmas','Pashas vigīlijas dziesmas'] },
  { key: 'etapa',      el: 'chips-etapa',
    values: ['Prekatehumenāts','Katehumenāts','Izredzētība','Liturģijas dziesmas'] },
];

function buildFilterChips() {
  FILTER_DEFS.forEach(({ key, el, values }) => {
    const container = document.getElementById(el);
    container.innerHTML = values.map(v =>
      `<button class="chip" data-key="${key}" data-val="${v}" onclick="toggleChip(this,'${key}','${v}')">${v}</button>`
    ).join('');
  });
}

function toggleChip(btn, key, val) {
  pendingFilters[key] = pendingFilters[key] === val ? null : val;
  document.querySelectorAll(`.chip[data-key="${key}"]`)
    .forEach(c => c.classList.toggle('active', c.dataset.val === pendingFilters[key]));
}

function openFilterDrawer() {
  pendingFilters = { ...activeFilters };
  FILTER_DEFS.forEach(({ key }) => {
    document.querySelectorAll(`.chip[data-key="${key}"]`)
      .forEach(c => c.classList.toggle('active', c.dataset.val === pendingFilters[key]));
  });
  document.getElementById('filter-drawer').classList.add('open');
}

function closeFilterDrawer() {
  document.getElementById('filter-drawer').classList.remove('open');
}

function applyFilters() {
  activeFilters = { ...pendingFilters };
  updateFilterIconState();
  closeFilterDrawer();
  renderList(filterSongs());
}

function clearFilters() {
  pendingFilters = { tiempo: null, eucaristia: null, liturgia: null, etapa: null };
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
}

function updateFilterIconState() {
  const hasAny = Object.values(activeFilters).some(Boolean);
  document.getElementById('filter-icon-btn').classList.toggle('has-filters', hasAny);
}

function updateActiveChips() {
  const row = document.getElementById('filter-row');
  const chips = Object.entries(activeFilters)
    .filter(([,v]) => v)
    .map(([k,v]) => `<button class="filter-btn active" onclick="removeFilter('${k}')">${v} ✕</button>`);
  row.innerHTML = chips.join('');
}

function removeFilter(key) {
  activeFilters[key] = null;
  pendingFilters[key] = null;
  updateFilterIconState();
  renderList(filterSongs());
}

// ─── DETAIL VIEW ─────────────────────────────────────────────────────────────
function openDetail(song) {
  currentSong = song;
  stopAudio();

  document.getElementById('detail-title').textContent = song.lv;
  const subs = [song.es, song.it].filter(Boolean).join(' · ');
  document.getElementById('detail-subtitle').textContent = subs;

  // Info grid
  const grid = document.getElementById('info-grid');
  const items = [];
  if (song.pagina) items.push(['Página', song.pagina]);
  if (song.biblia) items.push(['Biblia', song.biblia]);
  if (song.etapa)  items.push(['Etapa', song.etapa]);
  if (song.tiempo) items.push(['Tiempo litúrgico', song.tiempo]);
  if (song.eucaristia) items.push(['Eucaristía', song.eucaristia]);
  if (song.liturgia)   items.push(['Liturgia', song.liturgia]);

  grid.innerHTML = items.map(([label, val]) =>
    `<div class="info-item"><div class="info-label">${label}</div><div class="info-value">${val}</div></div>`
  ).join('');

  // Audio
  const audioSec = document.getElementById('audio-section');
  if (song.audio) {
    audioSec.style.display = 'block';
    checkIfDownloaded(song.id);
    document.getElementById('play-btn').textContent = '▶';
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('time-current').textContent = '0:00';
    document.getElementById('time-total').textContent = '--:--';
  } else {
    audioSec.style.display = 'none';
  }

  // PDF
  const pdfBtn = document.getElementById('pdf-btn');
  pdfBtn.style.display = song.pdf ? 'flex' : 'none';

  // Texto
  const textoSec = document.getElementById('texto-section');
  if (song.texto) {
    textoSec.style.display = 'block';
    // Render **bold** as italic colored
    const formatted = song.texto
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\\n/g, '\n');
    document.getElementById('texto-content').innerHTML = formatted;
  } else {
    textoSec.style.display = 'none';
  }

  // Switch views
  document.getElementById('list-view-container').style.display = 'none';
  const dv = document.getElementById('detail-view');
  dv.classList.add('open');
  dv.querySelector('#detail-body').scrollTop = 0;
}

function closeDetail() {
  stopAudio();
  document.getElementById('detail-view').classList.remove('open');
  document.getElementById('list-view-container').style.display = 'flex';
}

// ─── AUDIO PLAYER ────────────────────────────────────────────────────────────
let isPlaying = false;

function getAudioSrc(song) {
  // Check if we have a locally cached version in IndexedDB
  return getLocalAudio(song.id).then(blob => {
    if (blob) return URL.createObjectURL(blob);
    return song.audio;
  });
}

function togglePlay() {
  if (!currentSong || !currentSong.audio) return;
  if (isPlaying) {
    audioEl.pause();
  } else {
    if (!audioEl.src || audioEl.dataset.songId !== currentSong.id) {
      const btn = document.getElementById('play-btn');
      btn.textContent = '⏳';
      btn.classList.add('loading');
      getAudioSrc(currentSong).then(src => {
        audioEl.src = src;
        audioEl.dataset.songId = currentSong.id;
        audioEl.play().then(() => {
          btn.classList.remove('loading');
        }).catch(e => {
          btn.classList.remove('loading');
          btn.textContent = '▶';
        });
      });
    } else {
      audioEl.play();
    }
  }
}

function stopAudio() {
  if (audioEl.src) {
    audioEl.pause();
    audioEl.src = '';
    audioEl.dataset.songId = '';
  }
  isPlaying = false;
  document.getElementById('play-btn').textContent = '▶';
}

audioEl.addEventListener('play', () => {
  isPlaying = true;
  document.getElementById('play-btn').textContent = '⏸';
});
audioEl.addEventListener('pause', () => {
  isPlaying = false;
  document.getElementById('play-btn').textContent = '▶';
});
audioEl.addEventListener('ended', () => {
  isPlaying = false;
  document.getElementById('play-btn').textContent = '▶';
  document.getElementById('progress-fill').style.width = '0%';
});
audioEl.addEventListener('timeupdate', () => {
  if (!audioEl.duration) return;
  const pct = (audioEl.currentTime / audioEl.duration) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('time-current').textContent = fmt(audioEl.currentTime);
});
audioEl.addEventListener('loadedmetadata', () => {
  document.getElementById('time-total').textContent = fmt(audioEl.duration);
});

function seekAudio(e) {
  if (!audioEl.duration) return;
  const bar = document.getElementById('progress-bar');
  const rect = bar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audioEl.currentTime = pct * audioEl.duration;
}

function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

// ─── AUDIO DOWNLOAD (IndexedDB) ───────────────────────────────────────────────
const DB_NAME = 'dziesmas-audio', DB_VER = 1, STORE = 'blobs';

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore(STORE);
    req.onsuccess = e => res(e.target.result);
    req.onerror = () => rej(req.error);
  });
}

function getLocalAudio(id) {
  return openDB().then(db => new Promise((res) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).get(id);
    req.onsuccess = () => res(req.result || null);
    req.onerror = () => res(null);
  }));
}

function saveLocalAudio(id, blob) {
  return openDB().then(db => new Promise((res) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(blob, id);
    tx.oncomplete = res;
  }));
}

function checkIfDownloaded(id) {
  getLocalAudio(id).then(blob => {
    const btn = document.getElementById('download-audio-btn');
    if (blob) {
      btn.classList.add('downloaded');
      document.getElementById('dl-icon').textContent = '✓';
      document.getElementById('dl-label').textContent = 'Audio guardado offline';
    } else {
      btn.classList.remove('downloaded');
      document.getElementById('dl-icon').textContent = '⬇';
      document.getElementById('dl-label').textContent = 'Descargar para uso offline';
    }
  });
}

function downloadAudio() {
  if (!currentSong?.audio) return;
  const btn = document.getElementById('download-audio-btn');
  // If already downloaded, nothing to do
  if (btn.classList.contains('downloaded')) return;

  document.getElementById('dl-label').textContent = 'Descargando…';
  document.getElementById('dl-icon').textContent = '⏳';

  fetch(currentSong.audio)
    .then(r => r.blob())
    .then(blob => saveLocalAudio(currentSong.id, blob))
    .then(() => {
      btn.classList.add('downloaded');
      document.getElementById('dl-icon').textContent = '✓';
      document.getElementById('dl-label').textContent = 'Audio guardado offline';
    })
    .catch(() => {
      document.getElementById('dl-icon').textContent = '✕';
      document.getElementById('dl-label').textContent = 'Error al descargar';
      setTimeout(() => checkIfDownloaded(currentSong.id), 2000);
    });
}

// ─── PDF ─────────────────────────────────────────────────────────────────────
function openPDF() {
  if (!currentSong?.pdf) return;
  window.open(currentSong.pdf, '_blank');
}

// ─── OFFLINE DETECTION ────────────────────────────────────────────────────────
function updateOnlineStatus() {
  const badge = document.getElementById('offline-badge');
  if (!navigator.onLine) {
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

// ─── BACK BUTTON ─────────────────────────────────────────────────────────────
window.addEventListener('popstate', () => {
  if (document.getElementById('detail-view').classList.contains('open')) {
    closeDetail();
  }
});
document.getElementById('detail-view').addEventListener('transitionend', () => {});
</script>
